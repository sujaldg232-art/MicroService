version: '3.8'

services:

  redis-server:
    image: redis:6.2-alpine
    restart: unless-stopped
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  api-gateway:
    build:
      context: ./GatewayGO
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - redis-server

  user-db:
    image: mysql:8.1
    container_name: user-mysql
    environment:
      MYSQL_ROOT_PASSWORD: '1981'
      MYSQL_DATABASE: userdb
    ports:
      - "3305:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: mysql:8.1
    container_name: product-mysql
    environment:
      MYSQL_ROOT_PASSWORD: '1981'
      MYSQL_DATABASE: productdb
    ports:
      - "3308:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: mysql:8.1
    container_name: order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: '1981'
      MYSQL_DATABASE: orderdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_order_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  order-service:
    build:
      context: ./orderService
    deploy:
      replicas: 1
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:mysql://order-db:3306/orderdb?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  user-service:
    build:
      context: ./UserService
    expose:
      - "8081"
      - "9090"
    deploy:
      replicas: 1
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SERVER_PORT=8081
      - GRPC_SERVER_PORT=9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://user-db:3306/userdb?createDatabaseIfNotExist=true
      - AUTH_KEY=CGeOyQCzO4qyiqyxOzRC+RbLXutHk9qlCTuh4Nr1aDPftNI3QAq7+ARsbcRQS/nX52tUshS5+MCPpIPfGj3vYA==
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  product-service:
    build:
      context: ./productService
    expose:
      - "8082"
    deploy:
      replicas: 1
    depends_on:
      product-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:mysql://product-db:3306/productdb?createDatabaseIfNotExist=true
      - AUTH_KEY=CGeOyQCzO4qyiqyxOzRC+RbLXutHk9qlCTuh5Nr1aDPftNI3QAq7+ARsbcRQS/nX52tUshS5+MCPpIPfGj3vYA==
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

volumes:
  mysql_user_data:
  mysql_product_data:
  mysql_order_data: