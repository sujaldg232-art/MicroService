syntax = "proto3";

package org.example;

option java_multiple_files = true;
option java_package = "org.example.grpc";
option java_outer_classname = "DataProto";

message OrderlineValidationDto{
  string productID = 1;
  int32 Quantity = 2;
}


message OrderLineValidationOutPut{
  bool isValid = 1;
  string sellerID = 2;
  string  price = 3;
  string error = 4;
  int32 errorId = 5;
}

message BatchOrderLineValidationRequest {
  repeated OrderlineValidationDto requests = 1;
}

message BatchOrderLineValidationResponse {
  repeated OrderLineValidationOutPut responses = 1;
}

service OrderLineValidationService{
  rpc validateOrderLine(OrderlineValidationDto) returns (OrderLineValidationOutPut);
  rpc validateMultipleOrderLines(BatchOrderLineValidationRequest) returns (BatchOrderLineValidationResponse);
}
